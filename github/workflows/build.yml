name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flake8
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-line-length=127 --statistics
    
    - name: Run Day 1 Part 1
      run: python day1/part1.py
    
    - name: Run Day 1 Part 2
      run: python day1/part2.py
    
    - name: Run Day 2 Part 1
      run: python day2/part1.py
    
    - name: Run Day 2 Part 2
      run: python day2/part2.py
    
    - name: Run Day 3 Part 1
      run: python day3/part1.py
    
    - name: Run Day 3 Part 2
      run: python day3/part2.py
    
    - name: Run Day 4 Part 1
      run: python day4/part1.py
    
    - name: Run Day 4 Part 2
      run: python day4/part2.py
    
    - name: Run Day 5 Part 1
      run: python day5/part1.py
    
    - name: Run Day 5 Part 2
      run: python day5/part2.py
